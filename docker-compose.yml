services:
  postgres:
    image: postgres:16-alpine
    container_name: iot-demo-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-iot_demo}
      POSTGRES_USER: ${POSTGRES_USER:-iot_demo}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-iot_demo_password}
    ports:
      - "${POSTGRES_HOST_PORT:-5434}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-iot_demo} -d ${POSTGRES_DB:-iot_demo}"]
      interval: 5s
      timeout: 5s
      retries: 10

  web:
    build:
      context: ./web
    container_name: iot-demo-web
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: production
      HOSTNAME: 0.0.0.0
      PORT: 3000
      DATABASE_URL: postgres://${POSTGRES_USER:-iot_demo}:${POSTGRES_PASSWORD:-iot_demo_password}@postgres:5432/${POSTGRES_DB:-iot_demo}
      INGEST_TOKEN: ${INGEST_TOKEN:-}
      INGEST_RATE_LIMIT_PER_MIN: ${INGEST_RATE_LIMIT_PER_MIN:-0}
    ports:
      - "${WEB_PORT:-3000}:3000"
    healthcheck:
      test: ["CMD", "wget", "-q", "-O-", "http://127.0.0.1:3000/api/latest"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

volumes:
  postgres_data:
